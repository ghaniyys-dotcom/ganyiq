server {
    server_name ganyiq.ganys.me;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    # Reverse proxy to Next.js on port 3003
    location / {
        proxy_pass http://127.0.0.1:3003;
        proxy_read_timeout 1800;
        proxy_connect_timeout 120;
        proxy_send_timeout 120;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        client_max_body_size 100M;
        proxy_request_buffering off;
    }

    # Serve rendered clips directly (Next.js cannot serve post-build files)
    location /clips/ {
        root /var/www/ganyiq/public;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Block access to hidden files
    location ~ /\. {
        deny all;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/ganys.me/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/ganys.me/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}

server {
    if ($host = ganyiq.ganys.me) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    server_name ganyiq.ganys.me;
    return 301 https://$host$request_uri;


}
